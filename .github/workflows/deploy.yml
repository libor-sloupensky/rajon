name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_DIR: /tuptudu.cz/rajon
  PUBLIC_DIR: /tuptudu.cz/_sub/rajon

jobs:
  deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="FULL"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "FULL")
          fi

          if [ "$CHANGED" = "FULL" ]; then
            echo "full_deploy=true" >> $GITHUB_OUTPUT
            echo "vendor_changed=true" >> $GITHUB_OUTPUT
            echo "assets_changed=true" >> $GITHUB_OUTPUT
          else
            echo "$CHANGED"

            if echo "$CHANGED" | grep -qE "^composer\.(json|lock)$"; then
              echo "vendor_changed=true" >> $GITHUB_OUTPUT
            else
              echo "vendor_changed=false" >> $GITHUB_OUTPUT
            fi

            if echo "$CHANGED" | grep -qE "^(package\.json|package-lock\.json|vite\.config\.|resources/(css|js)/)"; then
              echo "assets_changed=true" >> $GITHUB_OUTPUT
            else
              echo "assets_changed=false" >> $GITHUB_OUTPUT
            fi

            echo "full_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        if: steps.changes.outputs.assets_changed == 'true' || steps.changes.outputs.full_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies and build assets
        if: steps.changes.outputs.assets_changed == 'true' || steps.changes.outputs.full_deploy == 'true'
        run: |
          npm install
          npm run build

      - name: Create .env for production
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME="Rajón"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://rajon.tuptudu.cz
          APP_LOCALE=cs
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=cs_CZ
          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12
          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error
          DB_CONNECTION=mysql
          DB_HOST=db.dw328.webglobe.com
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_CHARSET=utf8mb4
          DB_COLLATION=utf8mb4_unicode_ci
          SESSION_DRIVER=file
          SESSION_LIFETIME=10080
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null
          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file
          MAIL_MAILER=smtp
          MAIL_HOST=mail.webglobe.cz
          MAIL_PORT=587
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=tls
          MAIL_FROM_ADDRESS=festivaly@wormup.com
          MAIL_FROM_NAME="Rajón"
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=https://rajon.tuptudu.cz/auth/google/callback
          MIGRATE_TOKEN=${{ secrets.MIGRATE_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          MAPYCZ_API_KEY=${{ secrets.MAPYCZ_API_KEY }}
          CRON_TOKEN=${{ secrets.CRON_TOKEN }}
          ENVEOF
          sed -i 's/^          //' .env

      - name: Prepare split deployment structure
        run: |
          mkdir -p deploy-app deploy-public

          # App — vše kromě public/, node_modules/, .git/
          rsync -a --exclude='public/' --exclude='node_modules/' --exclude='.git/' --exclude='.claude/' . deploy-app/

          # Public — obsah public/
          rsync -a public/ deploy-public/

      - name: Deploy via lftp FTP
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1

          LFTP_CMDS=$(mktemp)

          cat > "$LFTP_CMDS" << 'LFTPEOF'
          set ftp:passive-mode yes
          set ftp:ssl-allow no
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:timeout 30
          LFTPEOF

          if [ "${{ steps.changes.outputs.full_deploy }}" = "true" ]; then
            echo "=== FULL DEPLOY ==="
            cat >> "$LFTP_CMDS" << LFTPEOF
          set net:connection-limit 3

          # App files → /tuptudu.cz/rajon/
          mirror --reverse --delete --no-perms --exclude storage/logs/ --exclude storage/framework/sessions/ --parallel=3 --verbose deploy-app/ ${{ env.APP_DIR }}/

          # Public files → /tuptudu.cz/_sub/rajon/
          mirror --reverse --delete --no-perms --parallel=3 --verbose deploy-public/ ${{ env.PUBLIC_DIR }}/
          LFTPEOF
          else
            echo "=== SMART DEPLOY ==="

            # .env vždy do app
            echo "put -O ${{ env.APP_DIR }}/ .env" >> "$LFTP_CMDS"

            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            for file in $CHANGED_FILES; do
              if [ ! -f "$file" ]; then
                # Soubor smazán
                if [[ "$file" == public/* ]]; then
                  REMOTE_FILE="${{ env.PUBLIC_DIR }}/${file#public/}"
                else
                  REMOTE_FILE="${{ env.APP_DIR }}/$file"
                fi
                echo "rm -f $REMOTE_FILE" >> "$LFTP_CMDS"
              elif [[ "$file" == public/* ]]; then
                # Public soubory → _sub/rajon/
                REL_PATH="${file#public/}"
                REL_DIR=$(dirname "$REL_PATH")
                if [ "$REL_DIR" != "." ]; then
                  echo "mkdir -pf ${{ env.PUBLIC_DIR }}/$REL_DIR" >> "$LFTP_CMDS"
                fi
                echo "put -O ${{ env.PUBLIC_DIR }}/$REL_DIR/ $file" >> "$LFTP_CMDS"
                echo "  Upload (public): $file"
              else
                # App soubory → rajon/
                FILE_DIR=$(dirname "$file")
                if [ "$FILE_DIR" != "." ]; then
                  echo "mkdir -pf ${{ env.APP_DIR }}/$FILE_DIR" >> "$LFTP_CMDS"
                fi
                echo "put -O ${{ env.APP_DIR }}/$FILE_DIR/ $file" >> "$LFTP_CMDS"
                echo "  Upload (app): $file"
              fi
            done

            if [ "${{ steps.changes.outputs.vendor_changed }}" = "true" ]; then
              echo "  Syncing vendor/..."
              echo "mirror --reverse --delete --no-perms --parallel=3 vendor ${{ env.APP_DIR }}/vendor" >> "$LFTP_CMDS"
            fi

            if [ "${{ steps.changes.outputs.assets_changed }}" = "true" ]; then
              echo "  Syncing public/build/..."
              echo "mirror --reverse --delete --no-perms --parallel=3 public/build ${{ env.PUBLIC_DIR }}/build" >> "$LFTP_CMDS"
            fi

            # Vždy aktualizovat autoloader
            echo "put -O ${{ env.APP_DIR }}/vendor/ vendor/autoload.php" >> "$LFTP_CMDS"
            echo "mirror --reverse --no-perms vendor/composer ${{ env.APP_DIR }}/vendor/composer" >> "$LFTP_CMDS"
          fi

          echo "quit" >> "$LFTP_CMDS"

          echo "--- lftp commands ---"
          cat "$LFTP_CMDS"
          echo "---"

          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "ftp://${{ secrets.FTP_SERVER }}" < "$LFTP_CMDS"
          rm -f "$LFTP_CMDS"
          echo "=== Deploy complete ==="

      - name: Post-deploy cache clear + migrate
        run: |
          curl -sL --max-time 60 "https://rajon.tuptudu.cz/deploy-hook.php?token=${{ secrets.MIGRATE_TOKEN }}&migrate" 2>&1 || echo "Deploy hook failed"
