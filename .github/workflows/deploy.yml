name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_DIR: /tuptudu.cz/rajon
  PUBLIC_DIR: /tuptudu.cz/_sub/rajon

jobs:
  deploy:
    name: Build & Deploy via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANGED="FULL"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "FULL")
          fi

          if [ "$CHANGED" = "FULL" ]; then
            echo "full_deploy=true" >> $GITHUB_OUTPUT
            echo "vendor_changed=true" >> $GITHUB_OUTPUT
            echo "assets_changed=true" >> $GITHUB_OUTPUT
          else
            echo "$CHANGED"

            if echo "$CHANGED" | grep -qE "^composer\.(json|lock)$"; then
              echo "vendor_changed=true" >> $GITHUB_OUTPUT
            else
              echo "vendor_changed=false" >> $GITHUB_OUTPUT
            fi

            if echo "$CHANGED" | grep -qE "^(package\.json|package-lock\.json|vite\.config\.|resources/(css|js)/)"; then
              echo "assets_changed=true" >> $GITHUB_OUTPUT
            else
              echo "assets_changed=false" >> $GITHUB_OUTPUT
            fi

            echo "full_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        if: steps.changes.outputs.assets_changed == 'true' || steps.changes.outputs.full_deploy == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies and build assets
        if: steps.changes.outputs.assets_changed == 'true' || steps.changes.outputs.full_deploy == 'true'
        run: |
          npm install
          npm run build

      - name: Create .env for production
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME="Rajón"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://rajon.tuptudu.cz
          APP_LOCALE=cs
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=cs_CZ
          APP_MAINTENANCE_DRIVER=file
          BCRYPT_ROUNDS=12
          LOG_CHANNEL=stack
          LOG_STACK=single
          LOG_DEPRECATIONS_CHANNEL=null
          LOG_LEVEL=error
          DB_CONNECTION=mysql
          DB_HOST=db.dw328.webglobe.com
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_CHARSET=utf8mb4
          DB_COLLATION=utf8mb4_unicode_ci
          SESSION_DRIVER=file
          SESSION_LIFETIME=10080
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null
          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file
          MAIL_MAILER=smtp
          MAIL_HOST=mail.webglobe.cz
          MAIL_PORT=587
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=tls
          MAIL_FROM_ADDRESS=festivaly@wormup.com
          MAIL_FROM_NAME="Rajón"
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI=https://rajon.tuptudu.cz/auth/google/callback
          MIGRATE_TOKEN=${{ secrets.MIGRATE_TOKEN }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          MAPYCZ_API_KEY=${{ secrets.MAPYCZ_API_KEY }}
          CRON_TOKEN=${{ secrets.CRON_TOKEN }}
          ENVEOF
          sed -i 's/^          //' .env

      - name: Prepare split deployment structure
        run: |
          mkdir -p deploy-app deploy-public

          # App — vše kromě public/, node_modules/, .git/
          rsync -a --exclude='public/' --exclude='node_modules/' --exclude='.git/' --exclude='.claude/' . deploy-app/

          # Public — obsah public/
          rsync -a public/ deploy-public/

      - name: Deploy app via lftp SFTP
        run: |
          sudo apt-get install -y lftp > /dev/null 2>&1

          # === APP deploy → /tuptudu.cz/rajon/ ===
          LFTP_SCRIPT=""

          if [ "${{ steps.changes.outputs.full_deploy }}" = "true" ]; then
            echo "=== FULL DEPLOY — APP ==="
            LFTP_SCRIPT="mirror --reverse --no-perms --exclude storage/logs/ --exclude storage/framework/sessions/ --parallel=1 --verbose deploy-app/ ${{ env.APP_DIR }}/;"
          else
            echo "=== SMART DEPLOY — APP ==="
            LFTP_SCRIPT="put -O ${{ env.APP_DIR }}/ .env;"

            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            for file in $CHANGED_FILES; do
              [[ "$file" == public/* ]] && continue
              if [ ! -f "$file" ]; then
                LFTP_SCRIPT="${LFTP_SCRIPT} rm -f ${{ env.APP_DIR }}/$file;"
              else
                dir=$(dirname "$file")
                if [ "$dir" != "." ]; then
                  LFTP_SCRIPT="${LFTP_SCRIPT} mkdir -pf ${{ env.APP_DIR }}/$dir;"
                fi
                LFTP_SCRIPT="${LFTP_SCRIPT} put -O ${{ env.APP_DIR }}/$dir/ $file;"
                echo "  Upload (app): $file"
              fi
            done

            if [ "${{ steps.changes.outputs.vendor_changed }}" = "true" ]; then
              LFTP_SCRIPT="${LFTP_SCRIPT} mirror --reverse --delete --no-perms --parallel=1 vendor ${{ env.APP_DIR }}/vendor;"
            fi

            LFTP_SCRIPT="${LFTP_SCRIPT} put -O ${{ env.APP_DIR }}/vendor/ vendor/autoload.php;"
            LFTP_SCRIPT="${LFTP_SCRIPT} mirror --reverse --no-perms vendor/composer ${{ env.APP_DIR }}/vendor/composer;"
          fi

          echo "--- APP lftp script ---"
          echo "$LFTP_SCRIPT"
          echo "---"

          lftp -e "
            set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -p 222';
            set xfer:clobber on;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open sftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
            ${LFTP_SCRIPT}
            quit
          "
          echo "=== APP deploy complete ==="

      - name: Deploy public via lftp SFTP
        run: |
          # === PUBLIC deploy → /tuptudu.cz/_sub/rajon/ ===
          LFTP_SCRIPT=""

          if [ "${{ steps.changes.outputs.full_deploy }}" = "true" ]; then
            echo "=== FULL DEPLOY — PUBLIC ==="
            LFTP_SCRIPT="mirror --reverse --no-perms --parallel=1 --verbose deploy-public/ ${{ env.PUBLIC_DIR }}/;"
          else
            echo "=== SMART DEPLOY — PUBLIC ==="
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || true)
            HAS_PUBLIC=false

            for file in $CHANGED_FILES; do
              [[ "$file" != public/* ]] && continue
              HAS_PUBLIC=true
              REL_PATH="${file#public/}"
              dir=$(dirname "$REL_PATH")

              if [ ! -f "$file" ]; then
                LFTP_SCRIPT="${LFTP_SCRIPT} rm -f ${{ env.PUBLIC_DIR }}/$REL_PATH;"
              else
                if [ "$dir" != "." ]; then
                  LFTP_SCRIPT="${LFTP_SCRIPT} mkdir -pf ${{ env.PUBLIC_DIR }}/$dir;"
                fi
                LFTP_SCRIPT="${LFTP_SCRIPT} put -O ${{ env.PUBLIC_DIR }}/$dir/ $file;"
                echo "  Upload (public): $REL_PATH"
              fi
            done

            if [ "${{ steps.changes.outputs.assets_changed }}" = "true" ]; then
              LFTP_SCRIPT="${LFTP_SCRIPT} mirror --reverse --delete --no-perms --parallel=1 public/build ${{ env.PUBLIC_DIR }}/build;"
            fi

            if [ "$HAS_PUBLIC" = "false" ] && [ "${{ steps.changes.outputs.assets_changed }}" != "true" ]; then
              echo "  No public changes, skipping"
              exit 0
            fi
          fi

          echo "--- PUBLIC lftp script ---"
          echo "$LFTP_SCRIPT"
          echo "---"

          lftp -e "
            set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -p 222';
            set xfer:clobber on;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            open sftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
            ${LFTP_SCRIPT}
            quit
          "
          echo "=== PUBLIC deploy complete ==="

      - name: Post-deploy cache clear + migrate
        run: |
          curl -sL --max-time 60 "https://rajon.tuptudu.cz/deploy-hook.php?token=${{ secrets.MIGRATE_TOKEN }}&migrate" 2>&1 || echo "Deploy hook failed"
